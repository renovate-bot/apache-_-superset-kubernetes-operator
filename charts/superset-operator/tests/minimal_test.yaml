# Stripped-down happy path: a full-render golden snapshot of a default
# `helm install`. With no `templates:` restriction, the whole chart is rendered,
# so the snapshot captures every manifest a minimal install deploys (Deployment,
# ServiceAccount, cluster-scoped manager RBAC, leader-election RBAC, metrics
# Service + auth RBAC). Any change to any rendered resource — including ones this
# file never mentions, and templates added to the chart later — shows up as a
# snapshot diff. Regenerate intended changes with `helm unittest -u`.
suite: minimal (default values)
# Pin chart/release identity so snapshots are stable across chart version bumps.
chart:
  version: 1.0.0
  appVersion: 1.0.0
release:
  name: my-release
  namespace: my-namespace
tests:
  - it: renders the default install manifests
    asserts:
      - matchSnapshot: {}
