# rumdl configuration — deterministic Markdown formatting.
# Docs: https://rumdl.dev/  Run `make lint-md` (check) or `make format-md` (fix).
#
# This root config governs Markdown rendered by GitHub (README, CONTRIBUTING,
# etc.). Files under docs/ are rendered by MkDocs and use docs/.rumdl.toml,
# which inherits these rules and only overrides the flavor.

# README and other top-level docs are rendered by GitHub → GitHub-Flavored Markdown.
flavor = "gfm"

exclude = [
    # GitHub issue/PR templates use frontmatter and H2-first bodies (MD041) and
    # are platform files rather than project docs.
    ".github",
    # Generated by `make codegen` (crd-ref-docs) — owned by the generator, not us.
    # (Paths are relative to the repo root, so docs/.rumdl.toml inherits this.)
    "docs/reference/api-reference.md",
]

# MD013 governs prose line wrapping. We enforce a single deterministic form:
# one line per paragraph (no hard wrapping). `reflow-mode = "normalize"` joins
# wrapped paragraphs back into a single line; the very large `line-length` means
# paragraphs are never split, so the canonical form is always one line. This
# keeps diffs clean (editing prose never reflows surrounding lines). Rendered
# output is unaffected — Markdown collapses newlines within a paragraph.
[MD013]
line-length = 100000
reflow = true
reflow-mode = "normalize"
code-blocks = false
tables = false
