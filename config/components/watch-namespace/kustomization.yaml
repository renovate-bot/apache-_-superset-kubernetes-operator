# Switches the operator from cluster-scoped to namespace-scoped reconciliation.
# The manager watches only its own deployment namespace via the Downward API.
# The ClusterRole generated by controller-gen is retained (it's the
# authoritative source of the permission set), but the ClusterRoleBinding
# is replaced with a namespaced RoleBinding that references the same
# ClusterRole. A RoleBinding pointing at a ClusterRole limits the granted
# permissions to the binding's namespace — so the operator's namespaced
# resource access is confined to where the binding lives.
#
# For multi-namespace watch via kustomize, extend this component: add one
# RoleBinding per target namespace and set WATCH_NAMESPACE to a comma-
# separated list (replace the Downward API patch below with a literal value).
#
# CRD installation still requires cluster-admin regardless of watch scope.
# Secure metrics auth still needs cluster-scoped RBAC (TokenReview /
# SubjectAccessReview are cluster-level APIs). If you cannot grant that,
# comment out the metrics_auth_role.yaml, metrics_auth_role_binding.yaml,
# and metrics_reader_role.yaml entries in config/rbac/kustomization.yaml,
# and drop the [METRICS] patch + metrics_service.yaml from
# config/default/kustomization.yaml.

apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

patches:
  - path: manager_watch_namespace_patch.yaml
    target:
      kind: Deployment
      name: controller-manager
  - patch: |-
      $patch: delete
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRoleBinding
      metadata:
        name: manager-rolebinding

resources:
  - manager_rolebinding.yaml
