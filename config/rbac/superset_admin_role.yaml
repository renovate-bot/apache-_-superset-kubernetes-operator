# This rule is not used by the project superset-kubernetes-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full (`*`) permissions on the parent `supersets` resource only. Child
# CRDs (SupersetWebServer, SupersetCeleryWorker, SupersetLifecycleTask, etc.)
# are controller-managed internals; this role grants read-only access to them
# for inspection. Administrators who need to delegate direct child-CR write
# access must build a custom role with the specific child-resource verbs
# required.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: superset-kubernetes-operator
    app.kubernetes.io/managed-by: kustomize
  name: superset-admin-role
rules:
- apiGroups:
  - superset.apache.org
  resources:
  - supersets
  verbs:
  - '*'
- apiGroups:
  - superset.apache.org
  resources:
  - supersetcelerybeats
  - supersetceleryflowers
  - supersetceleryworkers
  - supersetlifecycletasks
  - supersetmcpservers
  - supersetwebservers
  - supersetwebsocketservers
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - superset.apache.org
  resources:
  - supersets/status
  - supersetcelerybeats/status
  - supersetceleryflowers/status
  - supersetceleryworkers/status
  - supersetlifecycletasks/status
  - supersetmcpservers/status
  - supersetwebservers/status
  - supersetwebsocketservers/status
  verbs:
  - get
