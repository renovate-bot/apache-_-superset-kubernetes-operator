# This rule is not used by the project superset-kubernetes-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full (`*`) permissions on the parent `supersets` resource. Component
# and lifecycle state is exposed on the parent status.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: superset-kubernetes-operator
    app.kubernetes.io/managed-by: kustomize
  name: superset-admin-role
rules:
- apiGroups:
  - superset.apache.org
  resources:
  - supersets
  verbs:
  - '*'
- apiGroups:
  - superset.apache.org
  resources:
  - supersets/status
  verbs:
  - get
