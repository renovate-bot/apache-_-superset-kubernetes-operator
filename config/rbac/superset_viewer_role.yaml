# This rule is not used by the project superset-kubernetes-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to superset.apache.org resources — both the parent
# `supersets` CR and all controller-managed child CRs (useful for monitoring
# and inspection without modification).

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: superset-kubernetes-operator
    app.kubernetes.io/managed-by: kustomize
  name: superset-viewer-role
rules:
- apiGroups:
  - superset.apache.org
  resources:
  - supersets
  - supersetcelerybeats
  - supersetceleryflowers
  - supersetceleryworkers
  - supersetlifecycletasks
  - supersetmcpservers
  - supersetwebservers
  - supersetwebsocketservers
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - superset.apache.org
  resources:
  - supersets/status
  - supersetcelerybeats/status
  - supersetceleryflowers/status
  - supersetceleryworkers/status
  - supersetlifecycletasks/status
  - supersetmcpservers/status
  - supersetwebservers/status
  - supersetwebsocketservers/status
  verbs:
  - get
