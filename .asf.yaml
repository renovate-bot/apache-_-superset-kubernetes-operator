# https://cwiki.apache.org/confluence/display/INFRA/.asf.yaml+features+for+git+repositories
---
notifications:
  commits: commits@superset.apache.org
  issues: notifications@superset.apache.org
  pullrequests: notifications@superset.apache.org
  discussions: notifications@superset.apache.org

github:
  description: "Apache Superset Kubernetes Operator"
  homepage: https://superset.apache.org/
  labels:
    - superset
    - apache
    - apache-superset
    - kubernetes
    - kubernetes-operator
    - operator
    - asf

  features:
    issues: true
    projects: true
    discussions: true

  pull_requests:
    del_branch_on_merge: true
    allow_update_branch: true

  enabled_merge_buttons:
    squash: true
    merge: false
    rebase: false

  ghp_branch: gh-pages
  ghp_path: /

  protected_branches:
    main:
      required_status_checks:
        strict: false
        contexts:
          - Build
          - Lint
          - Verify codegen
          - Verify supported-versions table
          - Docker build
          - Helm lint
          - Unit & Integration
          - Apache Rat
      required_signatures: false

