coverage:
  # Badge/sunburst color gradient: red below 70%, gradient through 70–85%, solid
  # green at >=85%. The controller package dominates the statement-weighted total
  # and is intentionally exercised mostly via integration/e2e tests, so 85% is a
  # realistic "healthy" bar with headroom above current coverage.
  range: "70...85"
  status:
    project: off
    patch: off

comment:
  layout: "condensed_header, condensed_files, condensed_footer"
  behavior: default
  require_changes: true

ignore:
  - "api/v1alpha1/zz_generated.deepcopy.go"
  - "config/**"
  - "test/e2e/**"
  - "cmd/main.go"

flags:
  unit:
    paths:
      - "internal/"
      - "api/"
    carryforward: true
  integration:
    paths:
      - "internal/"
      - "api/"
    carryforward: true
